<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <title>Ultraflow</title>
    <!-- Anti-flash: stamp an explicit theme preference before first paint so a
         stored "dark" doesn't flash light on load. No stored preference is left
         unstamped so the CSS prefers-color-scheme rule follows the OS. -->
    <script>
      try {
        var t = localStorage.getItem("ultraflow-theme");
        if (t === "dark" || t === "light") document.documentElement.dataset.theme = t;
      } catch (e) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
